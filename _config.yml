title         : "Chen's blog"
description   : "Chen0x7ffc's blog, mostly about programming languages, algorithms, functional programming, compilers."
url           : https://0x7ffc.github.io # site url
baseurl       : ""
logo          : /assets/images/apple-touch-icon-precomposed.png

permalink   : /:year/:title/
markdown    : kramdown
highlighter : rouge

source      : ./
destination : ./_site

sass:
  sass_dir  : _scss
  style     : compressed # expanded

author:
  name     : "chen0x7ffc"

social:
  name: chen0x7ffc
  links:
    - https://github.com/0x7ffc

twitter:
  username: chen0x7ffc
  card: summary

defaults:
  - scope:
      path: ""
    values:
      image: /assets/images/apple-touch-icon-precomposed.png
      author: chen0x7ffc

webmaster_verifications:
  google: LrbQGpNpmw_icgvGLPdKTu5LasO_u7Bu3w2s0xoHrlQ
  bing: 5983F4DF7578DCA8D2431DFD9F3C742F
  baidu: TDbxJgoIdP

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - bourbon

# navbar pages
navbar:
  - slug : about
    title: About
  - slug : blog
    title: Blog

exclude:
  - "gulp"
  - "node_modules"
  - "bower"
  - "bower_components"
  - "config.rb"
  - "src"
  - "Gemfile"
  - "Gemfile.lock"
  - ".rvmrc"
  - ".rbenv-version"
  - "package.json"
  - "gulpfile.js"
  - "README.md"
  - "Rakefile"
  - "changelog.md"
  - "script"
  - "vendor"
